apiVersion: v1
kind: Secret
metadata:
  name: crabot-secrets
  namespace: crabot
type: Opaque
stringData:
  # These should be set via CI/CD or external secrets
  telegram-api-id: ""
  telegram-api-hash: ""
  telegram-bot-token: ""
  discord-token: ""
  slack-bot-token: ""
  slack-app-token: ""
  signal-cli-password: ""
  whatsapp-session-data: ""
  db-password: ""
  redis-password: ""
  encryption-key: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: crabot-ssh-keys
  namespace: crabot
type: Opaque
stringData:
  ssh-private-key: |
    # Your SSH private key here
  ssh-known-hosts: |
    # Your known hosts here